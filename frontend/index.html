<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Performance Optimization: Defer Google Tag and AdSense loading to post-render or user interaction
      function loadThirdPartyScripts() {
        if (window.thirdPartyScriptsLoaded) return;
        window.thirdPartyScriptsLoaded = true;

        // 1. Google Analytics (gtag.js)
        const gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-NFJ2GPVCSX';
        document.head.appendChild(gtagScript);

        window.dataLayer = window.dataLayer || [];
        window.gtag = function() { window.dataLayer.push(arguments); };
        window.gtag('js', new Date());
        window.gtag('config', 'G-NFJ2GPVCSX');

        // 2. Google AdSense (adsbygoogle.js)
        const adsenseScript = document.createElement('script');
        adsenseScript.async = true;
        adsenseScript.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7808569576221532';
        adsenseScript.crossOrigin = 'anonymous';
        document.head.appendChild(adsenseScript);
      }

      // Load dynamically after 3.5 seconds OR on first user interaction
      const loadTimeout = setTimeout(loadThirdPartyScripts, 3500);

      function triggerScriptLoad() {
        clearTimeout(loadTimeout);
        loadThirdPartyScripts();
        ['scroll', 'mousedown', 'touchstart', 'keydown'].forEach(event => {
          window.removeEventListener(event, triggerScriptLoad);
        });
      }

      ['scroll', 'mousedown', 'touchstart', 'keydown'].forEach(event => {
        window.addEventListener(event, triggerScriptLoad, { passive: true });
      });
    </script>
